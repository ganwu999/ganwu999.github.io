<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="screen-orientation" content="landscape">
    <title>感悟脚踩底层</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        html, body {
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background: #000;
        }
        /* 血红模式 */
        body.blood-mode {background: #4b0000;}
        body.blood-mode .snow-flake {background: #ff0000; filter: blur(0);}

        /* 手机横屏提示（循环动画） */
        .landscape-tip {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 1;
            pointer-events: all;
            transition: opacity 0.5s linear;
        }
        .tip-icon {
            font-size: 15vw;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000;
            margin-bottom: 20px;
            animation: rotateTip 2s linear infinite;
        }
        .tip-text {
            color: #fff;
            font-size: 4vw;
            font-weight: 900;
            text-align: center;
            text-shadow: 0 0 10px #ff0000;
            animation: flashTip 1s ease-in-out infinite alternate;
        }

        /* 开场动画 */
        .intro-anime {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 998;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: introHide 1.5s linear forwards;
        }
        .intro-text {
            font-size: 10vw;
            font-weight: 900;
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff, 0 0 20px #00aaff;
        }

        /* 4K背景图 */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        .bg-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 流光标题 */
        .title {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 5vw;
            font-weight: 900;
            z-index: 3;
            background: linear-gradient(90deg, transparent, #00f0ff, transparent);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 5px #00f0ff;
            animation: titleLight 2s linear infinite;
        }

        /* 按钮 */
        .watch-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 40px;
            font-size: 24px;
            background: #ff0000;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            z-index: 5;
            box-shadow: 0 0 20px #ff0000;
        }
        .select-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 6;
            display: none;
            gap: 40px;
        }
        .select-btn {
            padding: 15px 40px;
            font-size: 24px;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #666;
        }
        .confirm-btn {background: #ff0000;}

        /* 雪花全屏飘 */
        .snow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
        }
        .snow-flake {
            position: absolute;
            top: -10px;
            background: #fff;
            border-radius: 50%;
            filter: blur(0.5px);
            opacity: 0.8;
            animation: snowFall linear infinite;
        }

        /* 弹窗（极速出现，无延迟） */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.98);
            z-index: 997;
        }
        .popup-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .popup-close {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 40px;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
            cursor: pointer;
            z-index: 998;
        }

        /* 杂乱祝福文字（点确定才出，频率翻倍） */
        .bless-text-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 4;
            pointer-events: none;
            display: none;
        }
        .bless-text {
            position: absolute;
            color: #fff;
            font-size: clamp(16px, 3vw, 24px);
            font-weight: bold;
            text-shadow: 0 0 5px #ff0000;
            opacity: 0.8;
            animation: textFloat 3s linear infinite alternate;
        }

        /* 强制停止按钮 */
        .force-stop-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            font-size: 18px;
            color: #fff;
            background: #ff0000;
            border: 2px solid #fff;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1000;
            display: none;
        }

        /* 核心动画 */
        @keyframes introHide {
            0% {opacity: 1;}
            100% {opacity: 0; z-index: -1;}
        }
        @keyframes titleLight {
            0% {background-position: -200% 0;}
            100% {background-position: 200% 0;}
        }
        @keyframes snowFall {
            0% {transform: translateY(0) rotate(0deg);}
            100% {transform: translateY(100vh) rotate(720deg);}
        }
        @keyframes textFloat {
            0% {transform: translate(0, 0) rotate(0deg);}
            100% {transform: translate(10px, -10px) rotate(5deg);}
        }
        @keyframes rotateTip {
            0% {transform: rotate(0deg);}
            50% {transform: rotate(90deg);}
            100% {transform: rotate(0deg);}
        }
        @keyframes flashTip {
            0% {opacity: 0.6;}
            100% {opacity: 1;}
        }
    </style>
</head>
<body id="mainBody">
    <!-- 横屏提示层 -->
    <div class="landscape-tip" id="landscapeTip">
        <div class="tip-icon">📱</div>
        <div class="tip-text">请将手机旋转至横屏</div>
    </div>

    <!-- 开场动画 -->
    <div class="intro-anime" id="introAnime">
        <div class="intro-text">感悟</div>
    </div>

    <!-- 4K背景图（你的素材） -->
    <div class="bg-container">
        <img src="https://s41.ax1x.com/2026/01/25/pZ20vCV.jpg" class="bg-img" alt="4K背景">
    </div>

    <!-- 主容器 -->
    <div class="container">
        <div class="title">感悟脚踩底层</div>
        <button class="watch-btn" id="watchBtn">观看</button>
        <div class="select-box" id="selectBox">
            <button class="select-btn exit-btn" id="exitBtn">退出</button>
            <button class="select-btn confirm-btn" id="confirmBtn">确定</button>
        </div>
    </div>

    <!-- 雪花 -->
    <div class="snow" id="snow"></div>

    <!-- 杂乱祝福文字容器（默认隐藏，点确定才显示） -->
    <div class="bless-text-container" id="blessContainer"></div>

    <!-- 弹窗（你的素材） -->
    <div class="popup-overlay" id="popup">
        <img src="https://s41.ax1x.com/2026/01/25/pZ20X40.jpg" class="popup-img" alt="弹窗图片">
        <div class="popup-close" id="popupClose">X</div>
    </div>

    <!-- 强制停止按钮 -->
    <button class="force-stop-btn" id="forceStopBtn">强制停止</button>

    <!-- 音频（预加载优化，零延迟播放） -->
    <audio id="music" src="https://image2url.com/r2/default/audio/1769329498055-4ff528d0-945a-40c5-8c09-4144582e7d91.mp3" preload="auto">

    <script>
        // 获取所有元素
        const landscapeTip = document.getElementById('landscapeTip');
        const introAnime = document.getElementById('introAnime');
        const watchBtn = document.getElementById('watchBtn');
        const selectBox = document.getElementById('selectBox');
        const exitBtn = document.getElementById('exitBtn');
        const confirmBtn = document.getElementById('confirmBtn');
        const popup = document.getElementById('popup');
        const popupClose = document.getElementById('popupClose');
        const snow = document.getElementById('snow');
        const music = document.getElementById('music');
        const blessContainer = document.getElementById('blessContainer');
        const forceStopBtn = document.getElementById('forceStopBtn');
        let hasFloatPermission = false;
        let textInterval = null;
        let orientationWatchId = null;

        // 祝福文字库
        const blessTexts = [
            "祝你暴富暴美！", "好运连连不断！", "万事顺遂无忧！", "平安喜乐常伴！",
            "升职加薪暴富！", "健康快乐每一天！", "心想事成如愿！", "财运亨通大吉！",
            "福气满满爆棚！", "笑口常开好运来！", "事事顺心如意！", "锦鲤附体中大奖！"
        ];

        // 1. 设备检测与横屏提示
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (isMobile) {
            if (window.DeviceOrientationEvent) {
                orientationWatchId = window.addEventListener('deviceorientation', handleOrientation);
            } else {
                setTimeout(hideLandscapeTip, 3000);
            }
        } else {
            hideLandscapeTip();
        }

        function handleOrientation() {
            const isLandscape = window.innerWidth > window.innerHeight;
            if (isLandscape) {
                hideLandscapeTip();
                window.removeEventListener('deviceorientation', handleOrientation, false);
            }
        }

        function hideLandscapeTip() {
            landscapeTip.style.opacity = 0;
            setTimeout(() => landscapeTip.style.display = 'none', 500);
        }

        // 2. 雪花生成
        const createSnow = () => {
            snow.innerHTML = '';
            const snowCount = 150;
            for (let i = 0; i < snowCount; i++) {
                const flake = document.createElement('div');
                flake.className = 'snow-flake';
                const size = Math.random() * 5 + 1;
                const speed = Math.random() * 15 + 10;
                const left = Math.random() * 100;
                flake.style.cssText = `width: ${size}px; height: ${size}px; left: ${left}vw; animation-duration: ${speed}s`;
                snow.appendChild(flake);
            }
        };
        createSnow();

        // 3. 祝福文字生成（频率翻倍：每0.15秒一个，全屏快速叠加）
        const createRandomBlessText = () => {
            const text = document.createElement('div');
            text.className = 'bless-text';
            text.textContent = blessTexts[Math.floor(Math.random() * blessTexts.length)];
            text.style.left = `${Math.random() * 90}vw`;
            text.style.top = `${Math.random() * 90}vh`;
            const colors = ['#ff0000', '#ff69b4', '#ffff00', '#00ff00', '#ff4500'];
            text.style.color = colors[Math.floor(Math.random() * colors.length)];
            text.style.transform = `rotate(${Math.random() * 30 - 15}deg)`;
            text.style.fontSize = `${Math.random() * 16 + 14}px`;
            blessContainer.appendChild(text);
        };

        // 4. 悬浮窗权限申请
        const requestFloatPermission = () => {
            hasFloatPermission = confirm('是否允许开启悬浮窗权限？开启后显示强制停止按钮');
            if (hasFloatPermission) forceStopBtn.style.display = 'block';
        };

        // 5. 强制关闭功能
        const closePageAndBrowser = () => {
            try {window.close(); window.location.href = 'about:blank';}
            catch (e) {window.location.reload(); window.close();}
        };
        forceStopBtn.addEventListener('click', closePageAndBrowser);

        // 6. 点击观看：仅显示选择框，不生成文字
        watchBtn.addEventListener('click', () => {
            requestFloatPermission();
            watchBtn.style.display = 'none';
            document.body.classList.add('blood-mode');
            selectBox.style.display = 'flex';
        });

        // 7. 点击退出：恢复初始状态
        exitBtn.addEventListener('click', () => {
            selectBox.style.display = 'none';
            document.body.classList.remove('blood-mode');
            watchBtn.style.display = 'block';
            blessContainer.style.display = 'none';
            blessContainer.innerHTML = '';
            clearInterval(textInterval);
            forceStopBtn.style.display = 'none';
            hasFloatPermission = false;
        });

        // 8. 🔥 点击确定：立即显示祝福文字（高频）+ 5秒后同步触发弹窗+音频
        confirmBtn.addEventListener('click', () => {
            selectBox.style.display = 'none';
            // 立即开启高频祝福文字（每0.15秒一个，比之前快一倍）
            blessContainer.style.display = 'block';
            textInterval = setInterval(createRandomBlessText, 150);

            // 5秒后零延迟同步触发
            setTimeout(() => {
                // 弹窗立即显示（移除渐变动画，瞬间出现）
                popup.style.display = 'block';
                // 音频立即播放（预加载优化，无延迟）
                music.currentTime = 0;
                music.play().catch(err => console.log('音频播放失败：', err));
                // 停止生成文字
                clearInterval(textInterval);
            }, 5000);
        });

        // 9. 点击X：彻底恢复初始状态
        popupClose.addEventListener('click', () => {
            popup.style.display = 'none';
            document.body.classList.remove('blood-mode');
            watchBtn.style.display = 'block';
            blessContainer.style.display = 'none';
            blessContainer.innerHTML = '';
            music.pause();
            music.currentTime = 0;
            createSnow();
            forceStopBtn.style.display = 'none';
            hasFloatPermission = false;
            clearInterval(textInterval);
        });

        // 页面卸载清理
        window.addEventListener('beforeunload', () => {
            if (orientationWatchId) window.removeEventListener('deviceorientation', handleOrientation, false);
        });
    </script>
</body>
</html>
