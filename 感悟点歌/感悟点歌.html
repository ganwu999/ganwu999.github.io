<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晴天 - 沉浸式音乐播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft Yahei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 全局样式重置与基础设置 */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }

        /* 全屏提示界面 - 更醒目 */
        #fullscreen-prompt {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            transition: all 0.5s ease;
        }

        #fullscreen-prompt h2 {
            color: white;
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(79, 172, 254, 0.8);
            text-align: center;
            padding: 0 20px;
        }

        #fullscreen-btn {
            padding: 25px 50px;
            font-size: 28px;
            background: linear-gradient(90deg, #4facfe, #00f2fe, #ff6b9d);
            background-size: 200% 200%;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 40px rgba(79, 172, 254, 0.6);
            animation: btnGradient 3s ease infinite;
        }

        @keyframes btnGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #fullscreen-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 0 60px rgba(79, 172, 254, 0.9);
        }

        /* 主容器 - 优化显示逻辑 */
        #player-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: none;
            overflow: hidden;
            perspective: 1500px;
            z-index: 10;
        }

        /* 震撼入场动画 - 修复不生效问题 */
        @keyframes entrance {
            0% { 
                opacity: 0; 
                transform: scale(0.5) rotateY(30deg);
                filter: blur(20px);
            }
            50% { 
                opacity: 0.5; 
                transform: scale(1.1) rotateY(-10deg);
                filter: blur(10px);
            }
            100% { 
                opacity: 1; 
                transform: scale(1) rotateY(0);
                filter: blur(0);
            }
        }

        .entrance-animation {
            animation: entrance 5s cubic-bezier(0.23, 1, 0.32, 1) forwards !important;
        }

        /* 背景视频 - 优化加载和显示 */
        #background-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 120%;
            min-height: 120%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            z-index: 1;
            filter: brightness(0.8) contrast(1.1);
            object-fit: cover;
        }

        /* 背景叠加层 - 增强界面层次感 */
        #bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0.3),
                rgba(15, 23, 42, 0.7),
                rgba(0, 0, 0, 0.9)
            );
            z-index: 2;
        }

        /* 雪花特效容器 - 更自然的效果 */
        #snow-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        /* 紧急关闭按钮 - 更醒目但不突兀 */
        #emergency-close {
            position: absolute;
            top: 30px;
            left: 30px;
            padding: 12px 24px;
            background: rgba(255, 68, 68, 0.9);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 99999;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.6);
        }

        #emergency-close:hover {
            background: #ff0000;
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.9);
        }

        /* 左侧歌词区域 - 调整位置，更居中美观 */
        #lyrics-container {
            position: absolute;
            top: 50%;
            left: 15%; /* 从10%调整到15%，避免太靠左 */
            transform: translateY(-50%) rotate(-10deg); /* 旋转角度减小到-10度，更舒适 */
            transform-origin: center left;
            z-index: 4;
            display: flex;
            flex-direction: column;
            gap: 25px; /* 歌词间距增大 */
            padding: 30px;
            width: 40%; /* 增加歌词区域宽度 */
        }

        .lyric-line {
            color: white;
            font-size: 32px; /* 歌词字体增大 */
            text-shadow: 0 0 15px rgba(0, 0, 0, 0.9);
            opacity: 0;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            transform: translateX(-50px);
            font-weight: 500;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lyric-line.active {
            opacity: 1;
            transform: translateX(0);
            box-shadow: 0 0 25px rgba(79, 172, 254, 0.4);
            border-color: rgba(79, 172, 254, 0.5);
        }

        .lyric-line.fade-out {
            opacity: 0;
            transform: translateX(150px); /* 增大平移距离，效果更明显 */
            filter: blur(8px) grayscale(100%) brightness(0.5);
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 中间标题 - 更华丽的效果 */
        #title-container {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            text-align: center;
        }

        #main-title {
            font-size: 100px; /* 标题增大 */
            background: linear-gradient(90deg, #4facfe, #f093fb, #ff6b9d, #f7d794);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: 
                gradient 4s ease infinite,
                shake 6s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            margin: 0;
            letter-spacing: 5px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes shake {
            0%, 100% { transform: rotate(-3deg) scale(1.02); }
            25% { transform: rotate(1deg) scale(1); }
            50% { transform: rotate(3deg) scale(1.05); }
            75% { transform: rotate(-1deg) scale(1); }
        }

        /* 中间浮动文字 - 更灵动 */
        #floating-text {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 42px; /* 文字增大 */
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.9);
            z-index: 5;
            animation: float 10s ease-in-out infinite;
            opacity: 0.95;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 40px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes float {
            0%, 100% { transform: translate(-50%, -50%) translateY(0) rotate(0deg); }
            25% { transform: translate(-50%, -50%) translateY(-30px) rotate(2deg); }
            50% { transform: translate(-50%, -50%) translateY(0) rotate(0deg); }
            75% { transform: translate(-50%, -50%) translateY(30px) rotate(-2deg); }
        }

        /* 右侧唱片区域 - 完全重构，更精美 */
        #record-container {
            position: absolute;
            top: 50%;
            right: 12%; /* 调整位置，更居中 */
            transform: translateY(-50%);
            z-index: 4;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px; /* 增大间距 */
        }

        #record {
            width: 380px; /* 唱片增大 */
            height: 380px;
            border-radius: 50%;
            position: relative;
            animation: rotate 10s linear infinite;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.8), 0 0 30px rgba(79, 172, 254, 0.3);
            background: radial-gradient(
                circle at center,
                #444 25px,
                #111 25px 35px,
                #222 35px 170px,
                #111 170px 180px,
                #333 180px 190px
            );
            overflow: hidden;
        }

        /* 唱片纹理 - 增加细节 */
        #record::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(
                circle at center,
                transparent 0,
                transparent 2px,
                rgba(0, 0, 0, 0.3) 2px,
                rgba(0, 0, 0, 0.3) 3px
            );
            opacity: 0.7;
        }

        /* 唱片中心标签 - 更真实 */
        #record::after {
            content: 'JAY';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff6b9d, #f093fb);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        /* 唱片反光效果 */
        .record-glow {
            position: absolute;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 60%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 70%);
            z-index: 0;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 调节按钮 - 完全重构，醒目可见 */
        #settings-btn {
            padding: 20px 45px;
            font-size: 24px;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.6);
            font-weight: 600;
            letter-spacing: 2px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        #settings-btn:hover {
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(79, 172, 254, 0.9);
            border-color: white;
        }

        /* 调节面板 - 更美观，功能更清晰 */
        #settings-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            color: white;
            z-index: 9999;
            display: none;
            border: 2px solid rgba(79, 172, 254, 0.5);
            box-shadow: 0 0 100px rgba(79, 172, 254, 0.3);
        }

        #settings-panel.active {
            display: block;
            animation: panelFadeIn 0.5s ease forwards;
        }

        @keyframes panelFadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .panel-title {
            font-size: 32px;
            text-align: center;
            margin-bottom: 30px;
            color: #4facfe;
            text-shadow: 0 0 15px rgba(79, 172, 254, 0.7);
            letter-spacing: 3px;
        }

        .setting-section {
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .setting-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .setting-section h3 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #f093fb;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .setting-section h3::before {
            content: '✨';
            font-size: 20px;
        }

        .setting-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting-label {
            font-size: 16px;
            color: #e0e0e0;
            display: flex;
            justify-content: space-between;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            outline: none;
            -webkit-appearance: none;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            cursor: pointer;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.8), 0 2px 5px rgba(0, 0, 0, 0.5);
            transition: all 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(79, 172, 254, 1);
        }

        /* 开关样式 - 更美观 */
        .toggle-switch {
            position: relative;
            width: 60px;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .toggle-switch::before {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .toggle-switch.active {
            background: linear-gradient(90deg, #4facfe, #00f2fe);
        }

        .toggle-switch.active::before {
            left: 33px;
            background: white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3), 0 0 10px rgba(255, 255, 255, 0.8);
        }

        /* 音频控制条 - 新增，方便控制播放 */
        #audio-controls {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            z-index: 6;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-bottom: 15px;
            cursor: pointer;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4facfe, #ff6b9d);
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s linear;
        }

        .audio-btn-group {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .audio-btn {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .audio-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        .play-btn {
            background: linear-gradient(90deg, #4facfe, #ff6b9d);
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.6);
        }

        .play-btn:hover {
            background: linear-gradient(90deg, #ff6b9d, #4facfe);
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.9);
        }

        /* 音频元素 - 确保正常加载 */
        audio {
            display: none;
        }

        /* 加载提示 - 新增，避免等待无反馈 */
        #loading提示 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            z-index: 9999;
            display: none;
            text-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
        }

        #loading提示.active {
            display: block;
            animation: pulse 1.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <!-- 全屏提示界面 -->
    <div id="fullscreen-prompt">
        <h2>点击进入《晴天》沉浸式播放</h2>
        <button id="fullscreen-btn">进入全屏</button>
    </div>

    <!-- 播放器主容器 -->
    <div id="player-container">
        <!-- 背景视频 -->
        <video id="background-video" loop muted autoplay playsinline>
            <source src="https://screenapp.io/api/download?file=g2eYMTuXQo" type="video/mp4">
            您的浏览器不支持视频播放，请更新浏览器
        </video>

        <!-- 背景叠加层 -->
        <div id="bg-overlay"></div>

        <!-- 雪花容器 -->
        <div id="snow-container"></div>

        <!-- 加载提示 -->
        <div id="loading提示" class="active">加载中... 请稍候</div>

        <!-- 紧急关闭按钮 -->
        <button id="emergency-close">老师来了</button>

        <!-- 左侧歌词区域 -->
        <div id="lyrics-container"></div>

        <!-- 中间标题 -->
        <div id="title-container">
            <h1 id="main-title">晴天</h1>
        </div>

        <!-- 中间浮动文字 -->
        <div id="floating-text">感悟送你晴天</div>

        <!-- 右侧唱片区域 -->
        <div id="record-container">
            <div id="record">
                <div class="record-glow"></div>
            </div>
            <button id="settings-btn">调节</button>
        </div>

        <!-- 调节面板 -->
        <div id="settings-panel">
            <h2 class="panel-title">特效调节中心</h2>

            <!-- 基础控制 -->
            <div class="setting-section">
                <h3>基础控制</h3>
                <div class="setting-grid">
                    <div class="setting-item">
                        <div class="setting-label">
                            <span>音量大小</span>
                            <span id="volume-value">80%</span>
                        </div>
                        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8">
                    </div>
                    <div class="setting-item">
                        <div class="setting-label">
                            <span>背景亮度</span>
                            <span id="brightness-value">80%</span>
                        </div>
                        <input type="range" id="bg-brightness" min="0.3" max="1.5" step="0.05" value="0.8">
                    </div>
                </div>
            </div>

            <!-- 特效开关 -->
            <div class="setting-section">
                <h3>特效开关（共15种）</h3>
                <div class="setting-grid">
                    <div class="slider-container">
                        <span class="setting-label">雪花特效</span>
                        <div class="toggle-switch active" id="snow-toggle"></div>
                    </div>
                    <div class="slider-container">
                        <span class="setting-label">歌词动画</span>
                        <div class="toggle-switch active" id="lyrics-toggle"></div>
                    </div>
                    <div class="slider-container">
                        <span class="setting-label">唱片旋转</span>
                        <div class="toggle-switch active" id="record-toggle"></div>
                    </div>
                    <div class="slider-container">
                        <span class="setting-label">文字浮动</span>
                        <div class="toggle-switch active" id="float-toggle"></div>
                    </div>
                    <div class="slider-container">
                        <span class="setting-label">标题渐变</span>
                        <div class="toggle-switch active" id="gradient-toggle"></div>
                    </div>
                    <div class="slider-container">
                        <span class="setting-label">背景模糊</span>
                        <div class="toggle-switch active" id="blur-toggle"></div>
                    </div>
                    <div class="slider-container">
                        <span class="setting-label">歌词阴影</span>
                        <div class="toggle-switch active" id="lyric-shadow-toggle"></div>
                    </div>
                    <div class="slider-container">
                        <span class="setting-label">唱片光晕</span>
                        <div class="toggle-switch active" id="record-glow-toggle"></div>
                    </div>
                </div>
            </div>

            <!-- 特效强度调节 -->
            <div class="setting-section">
                <h3>特效强度调节</h3>
                <div class="setting-grid">
                    <div class="setting-item">
                        <div class="setting-label">
                            <span>雪花密度</span>
                            <span id="snow-density-value">10级</span>
                        </div>
                        <input type="range" id="snow-density" min="1" max="20" step="1" value="10">
                    </div>
                    <div class="setting-item">
                        <div class="setting-label">
                            <span>雪花速度</span>
                            <span id="snow-speed-value">5级</span>
                        </div>
                        <input type="range" id="snow-speed" min="1" max="10" step="0.1" value="5">
                    </div>
                    <div class="setting-item">
                        <div class="setting-label">

        // 1. 全屏控制 - 修复兼容性问题
        fullscreenBtn.addEventListener('click', async () => {
            const docEl = document.documentElement;
            loading提示.classList.add('active');

            try {
                // 尝试进入全屏（兼容所有浏览器）
                if (docEl.requestFullscreen) {
                    await docEl.requestFullscreen();
                } else if (docEl.mozRequestFullScreen) {
                    await docEl.mozRequestFullScreen();
                } else if (docEl.webkitRequestFullscreen) {
                    await docEl.webkitRequestFullscreen();
                } else if (docEl.msRequestFullscreen) {
                    await docEl.msRequestFullscreen();
                }

                // 检查全屏状态
                if (document.fullscreenElement || 
                    document.mozFullScreenElement || 
                    document.webkitFullscreenElement || 
                    document.msFullscreenElement) {
                    
                    fullscreenPrompt.style.display = 'none';
                    playerContainer.style.display = 'block';
                    
                    // 延迟添加入场动画，确保元素已渲染
                    setTimeout(() => {
                        playerContainer.classList.add('entrance-animation');
                    }, 100);

                    // 预加载音视频，确保播放正常
                    await Promise.all([
                        new Promise(resolve => {
                            backgroundVideo.onloadeddata = resolve;
                            backgroundVideo.load();
                        }),
                        new Promise(resolve => {
                            musicPlayer.onloadeddata = resolve;
                            musicPlayer.load();
                        })
                    ]);

                    // 隐藏加载提示
                    loading提示.classList.remove('active');

                    // 播放音视频
                    backgroundVideo.play();
                    musicPlayer.play();
                    playBtn.textContent = '⏸️';

                    // 初始化特效
                    createSnow();
                    initLyrics();
                    updateSettings();
                } else {
                    alert('必须进入全屏才能播放，请允许全屏权限！');
                    loading提示.classList.remove('active');
                }
            } catch (error) {
                console.error('全屏失败:', error);
                alert('全屏权限被拒绝，请重新尝试！');
                loading提示.classList.remove('active');
            }
        });

        // 2. 雪花特效 - 优化效果，更自然
        let snowFlakes = [];
        function createSnow() {
            snowContainer.innerHTML = '';
            snowFlakes = [];
            
            const density = parseInt(document.getElementById('snow-density').value);
            
            for (let i = 0; i < density * 15; i++) { // 增加雪花数量
                const snowflake = document.createElement('div');
                const size = Math.random() * 8 + 2;
                const opacity = Math.random() * 0.6 + 0.3;
                const blur = Math.random() * 2 + 1;
                
                snowflake.style.position = 'absolute';
                snowflake.style.width = `${size}px`;
                snowflake.style.height = `${size}px`;
                snowflake.style.background = 'white';
                snowflake.style.borderRadius = '50%';
                snowflake.style.opacity = opacity;
                snowflake.style.left = `${Math.random() * 100}%`;
                snowflake.style.top = `${Math.random() * -100}px`;
                snowflake.style.pointerEvents = 'none';
                snowflake.style.filter = `blur(${blur}px)`;
                snowflake.style.zIndex = '3';
                
                // 随机添加雪花形状变化
                if (Math.random() > 0.7) {
                    snowflake.style.borderRadius = '30%';
                }
                
                snowContainer.appendChild(snowflake);
                snowFlakes.push({
                    element: snowflake,
                    x: Math.random() * 100,
                    y: Math.random() * -100,
                    speed: Math.random() * parseFloat(document.getElementById('snow-speed').value) + 1,
                    drift: Math.random() * 3 - 1.5, // 增加左右漂移
                    rotation: Math.random() * 360
                });
            }
            
            animateSnow();
        }

        function animateSnow() {
            if (!document.getElementById('snow-toggle').classList.contains('active')) return;
            
            const speed = parseFloat(document.getElementById('snow-speed').value);
            
            snowFlakes.forEach(flake => {
                flake.y += flake.speed * (speed / 5);
                flake.x += flake.drift;
                flake.rotation += 1;
                
                if (flake.y > 100) {
                    flake.y = -10;
                    flake.x = Math.random() * 100;
                }
                
                flake.element.style.top = `${flake.y}%`;
                flake.element.style.left = `${flake.x}%`;
                flake.element.style.transform = `rotate(${flake.rotation}deg)`;
            });
            
            requestAnimationFrame(animateSnow);
        }

        // 3. 歌词初始化和同步 - 修复位置和动画
        let currentLyricIndex = -1;
        function initLyrics() {
            lyricsContainer.innerHTML = '';
            
            // 歌词垂直分布更均匀
            const containerHeight = lyricsContainer.offsetHeight;
            const lineGap = containerHeight / (lyricsData.length + 2);
            
            lyricsData.forEach((lyric, index) => {
                const lyricLine = document.createElement('div');
                lyricLine.className = 'lyric-line';
                lyricLine.textContent = lyric.text;
                lyricLine.style.top = `${index * lineGap}px`;
                lyricLine.style.left = '0';
                lyricLine.dataset.time = lyric.time;
                
                lyricsContainer.appendChild(lyricLine);
            });
            
            // 监听音频时间更新
            musicPlayer.addEventListener('timeupdate', updateLyrics);
        }

        function updateLyrics() {
            if (!document.getElementById('lyrics-toggle').classList.contains('active')) return;
            
            const currentTime = musicPlayer.currentTime;
            const lyricsOpacity = parseFloat(document.getElementById('lyrics-opacity').value);
            const rotateAngle = parseInt(document.getElementById('lyrics-rotate').value);
            
            // 更新歌词容器旋转角度
            lyricsContainer.style.transform = `translateY(-50%) rotate(${rotateAngle}deg)`;
            
            // 找到当前歌词
            for (let i = 0; i < lyricsData.length; i++) {
                if (currentTime >= lyricsData[i].time && 
                    (i === lyricsData.length - 1 || currentTime < lyricsData[i + 1].time)) {
                    
                    if (i !== currentLyricIndex) {
                        // 上一句歌词淡出
                        if (currentLyricIndex >= 0) {
                            const prevLyric = document.querySelectorAll('.lyric-line')[currentLyricIndex];
                            prevLyric.classList.remove('active');
                            prevLyric.classList.add('fade-out');
                        }
                        
                        // 当前歌词淡入
                        const currentLyric = document.querySelectorAll('.lyric-line')[i];
                        currentLyric.style.opacity = 0;
                        currentLyric.classList.add('active');
                        currentLyric.classList.remove('fade-out');
                        
                        // 渐入动画
                        let opacity = 0;
                        const fadeIn = () => {
                            opacity += 0.05;
                            currentLyric.style.opacity = opacity * lyricsOpacity;
                            if (opacity < 1) requestAnimationFrame(fadeIn);
                        };
                        fadeIn();
                        
                        currentLyricIndex = i;
                    }
                    break;
                }
            }
        }

        // 4. 调节面板控制 - 确保按钮可见且功能正常
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsPanel.classList.toggle('active');
        });

        // 点击面板外关闭
        document.addEventListener('click', (e) => {
            if (settingsPanel.classList.contains('active') && 
                !settingsPanel.contains(e.target) && 
                e.target !== settingsBtn) {
                settingsPanel.classList.remove('active');
            }
        });

        // 切换开关功能
        const toggleSwitches = document.querySelectorAll('.toggle-switch');
        toggleSwitches.forEach(toggle => {
            toggle.addEventListener('click', () => {
                toggle.classList.toggle('active');
                
                switch(toggle.id) {
                    case 'snow-toggle':
                        document.getElementById('snow-density').disabled = !toggle.classList.contains('active');
                        document.getElementById('snow-speed').disabled = !toggle.classList.contains('active');
                        if (toggle.classList.contains('active')) createSnow();
                        break;
                    case 'record-toggle':
                        record.style.animationPlayState = toggle.classList.contains('active') ? 'running' : 'paused';
                        break;
                    case 'lyrics-toggle':
                        lyricsContainer.style.opacity = toggle.classList.contains('active') ? '1' : '0';
                        break;
                    case 'float-toggle':
                        floatingText.style.animationPlayState = toggle.classList.contains('active') ? 'running' : 'paused';
                        break;
                    case 'gradient-toggle':
                        mainTitle.style.animation = toggle.classList.contains('active') 
                            ? 'gradient 4s ease infinite, shake 6s ease-in-out infinite' 
                            : 'none';
                        break;
                    case 'blur-toggle':
                        bgOverlay.style.backdropFilter = toggle.classList.contains('active') 
                            ? `blur(${document.getElementById('bg-blur').value}px)` 
                            : 'none';
                        break;
                    case 'lyric-shadow-toggle':
                        document.querySelectorAll('.lyric-line').forEach(line => {
                            line.style.textShadow = toggle.classList.contains('active') 
                                ? '0 0 15px rgba(0, 0, 0, 0.9)' 
                                : 'none';
                        });
                        break;
                    case 'record-glow-toggle':
                        document.querySelector('.record-glow').style.opacity = toggle.classList.contains('active') ? '1' : '0';
                        break;
                }
            });
        });

        // 滑块控制 - 实时更新数值显示
        const sliders = document.querySelectorAll('input[type="range"]');
        sliders.forEach(slider => {
            slider.addEventListener('input', (e) => {
                const value = e.target.value;
                const id = e.target.id;
                
                // 更新数值显示
                switch(id) {
                    case 'volume-slider':
                        document.getElementById('volume-value').textContent = `${Math.round(value * 100)}%`;
                        break;
                    case 'bg-brightness':
                        document.getElementById('brightness-value').textContent = `${Math.round(value * 100)}%`;
                        break;
                    case 'snow-density':
                        document.getElementById('snow-density-value').textContent = `${value}级`;
                        break;
                    case 'snow-speed':
                        document.getElementById('snow-speed-value').textContent = `${value}级`;
                        break;
                    case 'lyrics-opacity':
                        document.getElementById('lyrics-opacity-value').textContent = `${Math.round(value * 100)}%`;
                        break;
                    case 'record-speed':
                        document.getElementById('record-speed-value').textContent = `${value}s/圈`;
                        break;
                    case 'float-amplitude':
                        document.getElementById('float-amplitude-value').textContent = `${value}px`;
                        break;
                    case 'shake-amplitude':
                        document.getElementById('shake-amplitude-value').textContent = `${value}°`;
                        break;
                    case 'bg-blur':
                        document.getElementById('blur-value').textContent = `${value}px`;
                        break;
                    case 'lyrics-rotate':
                        document.getElementById('lyrics-rotate-value').textContent = `${value}°`;
                        break;
                }
                
                updateSettings();
            });
        });

        // 更新所有设置
        function updateSettings() {
            // 音量控制
            musicPlayer.volume = parseFloat(document.getElementById('volume-slider').value);
            
            // 雪花设置
            if (document.getElementById('snow-toggle').classList.contains('active')) {
                createSnow();
            }
            
            // 歌词设置
            const lyricsOpacity = parseFloat(document.getElementById('lyrics-opacity').value);
            const rotateAngle = parseInt(document.getElementById('lyrics-rotate').value);
            lyricsContainer.style.transform = `translateY(-50%) rotate(${rotateAngle}deg)`;
            
            document.querySelectorAll('.lyric-line').forEach(line => {
                line.style.opacity = lyricsOpacity;
                line.style.textShadow = document.getElementById('lyric-shadow-toggle').classList.contains('active')
                    ? '0 0 15px rgba(0, 0, 0, 0.9)'
                    : 'none';
            });
            
            // 唱片设置
            const recordSpeed = parseInt(document.getElementById('record-speed').value);
            record.style.animation = `rotate ${recordSpeed}s linear infinite`;
            document.querySelector('.record-glow').style.opacity = document.getElementById('record-glow-toggle').classList.contains('active') ? '1' : '0';
            
            // 背景设置
            const bgBrightness = parseFloat(document.getElementById('bg-brightness').value);
            backgroundVideo.style.filter = `brightness(${bgBrightness}) contrast(1.1)`;
            
            // 背景模糊
            if (document.getElementById('blur-toggle').classList.contains('active')) {
                const blurValue = parseInt(document.getElementById('bg-blur').value);
                bgOverlay.style.backdropFilter = `blur(${blurValue}px)`;
            } else {
                bgOverlay.style.backdropFilter = 'none';
            }
            
            // 标题动画设置
            const shakeAmplitude = parseFloat(document.getElementById('shake-amplitude').value);
            mainTitle.style.animation = `gradient 4s ease infinite, shake 6s ease-in-out infinite`;
            mainTitle.style.animationKeyframes = {
                shake: {
                    '0%, 100%': { transform: `rotate(-${shakeAmplitude}deg) scale(1.02)` },
                    '25%': { transform: `rotate(${shakeAmplitude/2}deg) scale(1)` },
                    '50%': { transform: `rotate(${shakeAmplitude}deg) scale(1.05)` },
                    '75%': { transform: `rotate(-${shakeAmplitude/2}deg) scale(1)` }
                }
            };
            
            // 浮动文字设置
            const floatAmplitude = parseInt(document.getElementById('float-amplitude').value);
            floatingText.style.animation = `float 10s ease-in-out infinite`;
            floatingText.style.animationKeyframes = {
                float: {
                    '0%, 100%': { transform: 'translate(-50%, -50%) translateY(0) rotate(0deg)' },
                    '25%': { transform: `translate(-50%, -50%) translateY(-${floatAmplitude}px) rotate(2deg)` },
                    '50%': { transform: 'translate(-50%, -50%) translateY(0) rotate(0deg)' },
                    '75%': { transform: `translate(-50%, -50%) translateY(${floatAmplitude}px) rotate(-2deg)` }
                }
            };
        }

        // 5. 音频控制功能 - 新增播放/暂停/进度控制
        playBtn.addEventListener('click', () => {
            if (musicPlayer.paused) {
                musicPlayer.play();
                backgroundVideo.play();
                record.style.animationPlayState = 'running';
                playBtn.textContent = '⏸️';
            } else {
                musicPlayer.pause();
                backgroundVideo.pause();
                record.style.animationPlayState = 'paused';
                playBtn.textContent = '▶️';
            }
        });

        // 进度条控制
        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            const percent = clickX / width;
            
            musicPlayer.currentTime = percent * musicPlayer.duration;
            progressBar.style.width = `${percent * 100}%`;
        });

        // 实时更新进度条
        musicPlayer.addEventListener('timeupdate', () => {
            const percent = (musicPlayer.currentTime / musicPlayer.duration) * 100;
            progressBar.style.width = `${percent}%`;
        });

        // 6. 紧急关闭功能 - 增强关闭效果
        emergencyClose.addEventListener('click', () => {
            // 立即停止所有播放
            musicPlayer.pause();
            backgroundVideo.pause();
            
            // 关闭浏览器窗口（多种方案兼容）
            if (window.close) {
                window.close();
            }
            
            // 备用方案：清空页面并跳转
            setTimeout(() => {
                document.body.innerHTML = '';
                window.location.href = 'about:blank';
                window.opener = null;
                window.open('', '_self');
                window.close();
            }, 50);
            
            // 终极方案：终止所有进程
            setTimeout(() => {
                if (window.stop) {
                    window.stop();
                }
                document.documentElement.innerHTML = '';
                navigator.serviceWorker.getRegistrations().then(registrations => {
                    registrations.forEach(registration => registration.unregister());
                });
            }, 100);
        });

        // 7. 错误处理 - 确保音视频加载失败时提示
        musicPlayer.addEventListener('error', (e) => {
            console.error('音频加载失败:', e);
            alert('音频加载失败，请检查网络连接或刷新页面重试！');
            loading提示.classList.remove('active');
        });

        backgroundVideo.addEventListener('error', (e) => {
            console.error('视频加载失败:', e);
            alert('视频加载失败，请检查网络连接或刷新页面重试！');
            loading提示.classList.remove('active');
        });

        // 初始化设置
        updateSettings();

        // 确保唱片旋转不停止
        setInterval(() => {
            if (musicPlayer.playing && record.style.animationPlayState === 'paused') {
                record.style.animationPlayState = 'running';
            }
        }, 1000);
    </script>
</body>
</html>
